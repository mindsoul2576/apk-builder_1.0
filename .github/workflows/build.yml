name: Build APK

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Website URL'
        required: true
        default: 'https://google.com'
      app_name:
        description: 'App Name'
        required: true
        default: 'My App'
      package_name:
        description: 'Package Name'
        required: true
        default: 'com.myapp'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
        
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
        
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Create Capacitor Project
        run: |
          npm install -g @capacitor/cli @capacitor/core @capacitor/android
          mkdir myapp
          cd myapp
          npx cap init "${{ github.event.inputs.app_name }}" "${{ github.event.inputs.package_name }}"
          npx cap add android
          mkdir -p www
          echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>${{ github.event.inputs.app_name }}</title><meta http-equiv="refresh" content="0; url=${{ github.event.inputs.url }}"></head><body><p>Loading...</p></body></html>' > www/index.html
          npx cap sync
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: myapp/android/app/build/outputs/apk/debug/*.apk
